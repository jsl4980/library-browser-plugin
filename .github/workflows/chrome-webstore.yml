name: Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      upload_to_store:
        description: Upload dist/library-browser-plugin.zip via Publish API
        type: boolean
        default: true
      publish:
        description: Publish after upload (submit for review)
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  pack-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and pack
        run: |
          npm ci
          npm run pack

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-browser-plugin-zip
          path: |
            dist/library-browser-plugin.zip
            dist/library-browser-plugin-v*.zip

      - name: Upload to Chrome Web Store
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.upload_to_store)
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: dist/library-browser-plugin.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
